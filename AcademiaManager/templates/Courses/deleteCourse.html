{% extends 'Courses/base.html' %}
{% block title %}Delete Course{% endblock %}
{% block content %}
<h3>Are you sure you want to delete <strong>{{ course.name }}</strong>?</h3>
<form method="post"  enctype="multipart/form-data">s
  {% csrf_token %}
  <button type="submit" class="btn btn-danger">Yes, delete</button>
  <a href="{% url 'single_course' course.code %}" class="btn btn-secondary">Cancel</a>
</form>
{% endblock %}
