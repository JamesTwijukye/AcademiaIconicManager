
{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Student Details</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #f9f9f9;
      font-family: Arial, sans-serif;
      padding: 30px;
    }

    .card {
      max-width: 600px;
      margin: 0 auto;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0, 0, 0, 0.1);
      background-color: white;
    }

    .card-img-top {
      width: 150px;
      height: 150px;
      object-fit: cover;
      border-radius: 50%;
      margin: 0 auto 20px auto;
      display: block;
    }

    .card-title {
      text-align: center;
      margin-bottom: 20px;
      font-size: 24px;
      color: #004080;
    }

    .info-group {
      margin-bottom: 15px;
    }

    .label {
      font-weight: bold;
      color: #333;
    }

    .value {
      color: #555;
    }

    .btn-back {
      display: block;
      margin: 30px auto 0 auto;
      text-align: center;
    }
  </style>
</head>
<body>

  <div class="card">
    <img src="{{ student.profile_pic.url }}" alt="Profile Picture" class="card-img-top">
    <h2 class="card-title">{{ student.first_name }} {{ student.last_name }}</h2>

    <div class="info-group">
      <span class="label">Student ID:</span>
      <span class="value">{{ student.student_id }}</span>
    </div>

    <div class="info-group">
      <span class="label">Email:</span>
      <span class="value">{{ student.email }}</span>
    </div>

    <div class="info-group">
      <span class="label">Contact:</span>
      <span class="value">{{ student.contact }}</span>
    </div>

    <div class="info-group">
      <span class="label">Address:</span>
      <span class="value">{{ student.address }}</span>
    </div>

    <div class="info-group">
      <span class="label">Date Registered:</span>
      <span class="value">{{ student.dateCreated }}</span>
    </div>

    <a href="{% url 'all_students' %}" class="btn btn-primary btn-back">← Back to All Students</a>
  </div>

</body>
</html>
