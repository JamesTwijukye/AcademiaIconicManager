{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>Add Student</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />

    <style>
        html, body {
            height: 100%;
            margin: 0;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .form-container {
            width: 50vw;
            height: 70vh;
            background: white;
            border-radius: 8px;
            padding: 10px 15px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
            overflow: hidden; /* hide overflow */
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        h2 {
            font-size: 16px;
            margin: 0 0 8px 0;
            text-align: center;
            font-weight: 600;
            color: #333;
            flex-shrink: 0;
        }

        form {
            flex-grow: 1;
            overflow: hidden; /* prevent scroll inside form */
        }

        .form-group {
            margin-bottom: 6px;
        }

        label {
            font-size: 12px;
            margin-bottom: 2px;
            font-weight: 600;
            display: block;
        }

        input.form-control,
        select.form-control,
        textarea.form-control {
            height: 22px;
            font-size: 11px;
            padding: 2px 5px;
            box-sizing: border-box;
        }

        /* For file input to not be too tall */
        input[type="file"] {
            height: auto;
            padding: 2px 5px;
            font-size: 11px;
        }

        .btn-group {
            margin-top: 6px;
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-shrink: 0;
        }

        button.btn, a.btn {
            font-size: 12px;
            padding: 4px 10px;
            min-width: 70px;
        }
    </style>
</head>
<body>

    <div class="form-container">
        <h2>Add Student</h2>
        <form method="POST" enctype="multipart/form-data" novalidate>
            {% csrf_token %}
            {% for field in form %}
                <div class="form-group">
                    <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                    {{ field }}
                    {% if field.help_text %}
                        <small class="form-text text-muted" style="font-size:10px;">{{ field.help_text }}</small>
                    {% endif %}
                    {% if field.errors %}
                        <div class="text-danger" style="font-size: 10px;">{{ field.errors }}</div>
                    {% endif %}
                </div>
            {% endfor %}
            <div class="btn-group">
                <a href="{% url 'all_students' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary">Save</button>
            </div>
        </form>
    </div>

</body>
</html>
